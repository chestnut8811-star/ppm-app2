<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CIEDCheck Lab</title>
    <script>(function(){var t=localStorage.getItem('pacecheck-theme');if(!t)t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})()</script>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f7f8;
        --surface: #ffffff;
        --ink: #21313a;
        --muted: #667780;
        --line: #d7e2df;
        --primary: #0f766e;
        --primary-dark: #0b5f59;
      }

      :root[data-theme="dark"] {
        --bg: #0f1419;
        --surface: #1a2228;
        --ink: #e0e8ec;
        --muted: #8b99a3;
        --line: #2a3840;
        --primary: #14b8a6;
        --primary-dark: #0d9488;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        position: relative;
        width: min(760px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 18px 40px rgba(24, 39, 46, 0.09);
      }

      .theme-toggle {
        position: absolute;
        top: 16px;
        right: 16px;
        min-height: 32px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        padding: 4px 10px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      .theme-toggle:hover {
        border-color: var(--primary);
        color: var(--primary-dark);
      }

      p {
        color: var(--muted);
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        display: block;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        text-decoration: none;
      }

      a:hover {
        border-color: var(--primary);
        background: #eef5f3;
      }

      strong {
        display: block;
        color: var(--primary-dark);
        font-size: 18px;
      }

      span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
      }

      [data-theme="dark"] main {
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      [data-theme="dark"] a:hover {
        background: #1e2a30;
      }
    </style>
  </head>
  <body>
    <main>
      <button id="themeToggle" class="theme-toggle" type="button"></button>
      <h1>CIEDCheck Lab</h1>
      <p>用途に合わせてCIEDCheckの各ツールを開いてください。</p>
      <div class="links">
        <a href="./CIEDCheck Studio.html">
          <strong>CIEDCheck Studio</strong>
          <span>教育・記録・PDF出力ツール</span>
        </a>
        <a href="./CIEDCheck Arena/CIEDCheck Arena.html">
          <strong>CIEDCheck Arena</strong>
          <span>プログラマー操作シミュレーター</span>
        </a>
        <a href="./CIEDCheck CRT/CIEDCheck CRT.html">
          <strong>CIEDCheck CRT</strong>
          <span>CRT-P / CRT-D 教育・最適化シミュレーター</span>
        </a>
        <a href="./CIEDCheck ICD/CIEDCheck ICD.html">
          <strong>CIEDCheck ICD</strong>
          <span>ICD / CRT-D 検出・治療設定シミュレーター</span>
        </a>
      </div>
    </main>
    <script>
      function updateThemeButton() {
        var btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀ ライト' : '☾ ダーク';
      }
      document.getElementById('themeToggle').addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pacecheck-theme', next);
        updateThemeButton();
      });
      updateThemeButton();
    </script>
  </body>
</html>
